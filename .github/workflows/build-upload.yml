name: Build & Upload

on:
  workflow_dispatch:

jobs:
  build:
    name: Build and Upload
    runs-on: blacksmith-16vcpu-ubuntu-2404

    permissions:
      contents: read

    steps:
      - name: Check-out ELFeatures
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: 'never'
          cache-overwrite-existing: true
          gradle-version: '9.4.1'

      - name: Clean Loom cache
        run: rm -rf ~/.gradle/caches/fabric-loom

      - name: Generate Fabric sources
        run: ./gradlew genSources --no-daemon --stacktrace

      - name: Debug Loom jars
        run: |
          echo "=== All MC jars in Loom cache ==="
          find ~/.gradle/caches/fabric-loom -name "*.jar" -path "*26.1*" | while read f; do
            COUNT=$(jar tf "$f" | grep "net/minecraft/client/" | wc -l)
            SIZE=$(stat --format=%s "$f")
            echo "$f — ${SIZE} bytes, client entries: ${COUNT}"
          done

      - name: Build fabric:v2
        run: ./gradlew :platform:fabric:v2:compileJava --no-daemon --refresh-dependencies --stacktrace

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --parallel --build-cache --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ELFeatures
          path: build/elfeatures-*.jar
          if-no-files-found: warn
